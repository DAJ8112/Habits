name: HabitTracker

options:
  bundleIdPrefix: com.dhruviljoshi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_TESTABILITY: YES   # allows @testable import HabitTracker from the test target
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM is filled in after you pick your team in Xcode (see plan).

targets:
  HabitTracker:
    type: application
    platform: iOS
    sources:
      - path: HabitTracker
      - path: HabitWidget/HabitWidgetUI.swift   # shared widget view, reused by the in-app preview
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Habits
        PRODUCT_BUNDLE_IDENTIFIER: com.dhruviljoshi.habittracker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  HabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/HabitTrackerTests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dhruviljoshi.habittracker.tests

  HabitTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/HabitTrackerUITests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dhruviljoshi.habittracker.uitests

schemes:
  HabitTracker:
    build:
      targets:
        HabitTracker: all
        HabitTrackerTests: [test]
        HabitTrackerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HabitTrackerTests
        - HabitTrackerUITests
    archive:
      config: Release
